name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4
    
    - name: 🟢 Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: 🔨 Build Project
      env:
        VITE_SITE_URL: https://edio-iq.com
        VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
        VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      run: |
        npm install
        npm run build
        
    - name: 📂 Sync files to Hostinger
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER || secrets.FTP_HOST || secrets.HOSTINGER_FTP_SERVER || secrets.HOSTINGER_FTP_HOST || vars.FTP_SERVER || vars.FTP_HOST || vars.HOSTINGER_FTP_SERVER || vars.HOSTINGER_FTP_HOST }}
        username: ${{ secrets.FTP_USERNAME || secrets.FTP_USER || secrets.HOSTINGER_FTP_USERNAME || secrets.HOSTINGER_FTP_USER || vars.FTP_USERNAME || vars.FTP_USER || vars.HOSTINGER_FTP_USERNAME || vars.HOSTINGER_FTP_USER }}
        password: ${{ secrets.FTP_PASSWORD || secrets.HOSTINGER_FTP_PASSWORD }}
        local-dir: ./dist/
        server-dir: ./public_html/
